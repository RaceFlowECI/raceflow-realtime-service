server:
  port: 8083

spring:
  application:
    name: raceflow-realtime-service
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_REDIS_SSL:false}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:raceflow}
    password: ${RABBITMQ_PASSWORD:raceflow2026}

jwt:
  secret: ${JWT_SECRET:raceflow-dev-secret-key-for-local-dev-only-32chars}

auth:
  grpc:
    host: ${AUTH_GRPC_HOST:localhost}
    port: ${AUTH_GRPC_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: local

# OpenTelemetry — config fallback para ejecucion local sin Docker
# El agente lee estas propiedades si las env vars OTEL_* no estan definidas
otel:
  service:
    name: ${OTEL_SERVICE_NAME:raceflow-realtime-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
