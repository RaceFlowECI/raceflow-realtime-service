server:
  port: 8083

spring:
  application:
    name: raceflow-realtime-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:raceflow}
    password: ${RABBITMQ_PASS:raceflow2026}

jwt:
  secret: ${JWT_SECRET:raceflow-dev-secret-key-for-local-dev-only-32chars}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: local

# OpenTelemetry — config fallback para ejecucion local sin Docker
# El agente lee estas propiedades si las env vars OTEL_* no estan definidas
otel:
  service:
    name: ${OTEL_SERVICE_NAME:raceflow-realtime-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
